services:
  - type: web
    name: tw-stock-scanner-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /status
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
