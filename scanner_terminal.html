<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWSE Scanner — Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080a0c;
  --bg2:     #0d1117;
  --bg3:     #131920;
  --border:  #1c2530;
  --border2: #263040;
  --amber:   #e8a030;
  --amber-d: #7a5010;
  --amber-g: #e8a03028;
  --green:   #00c870;
  --green-d: #005c35;
  --red:     #f04060;
  --blue:    #4090ff;
  --violet:  #a080ff;
  --text:    #b0c8d8;
  --dim:     #506070;
  --mute:    #283848;
  --mono:    'IBM Plex Mono', 'Consolas', monospace;
  --hh: 48px;
  --sh: 34px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  height: 100vh;
  overflow: hidden;
  line-height: 1;
}

/* ── Progress ── */
#prog {
  height: 2px; background: var(--amber);
  position: fixed; top: 0; left: 0; width: 0%;
  z-index: 999; transition: width 0.3s;
  box-shadow: 0 0 8px var(--amber);
}

/* ── Header ── */
#hdr {
  height: var(--hh);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 0;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
#hdr::-webkit-scrollbar { display: none; }

.vsep {
  flex-shrink: 0;
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 12px;
}

.logo {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.25em;
  color: var(--amber);
  display: flex; align-items: center; gap: 7px;
}
.logo::before {
  content: '';
  width: 7px; height: 7px;
  background: var(--amber);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--amber);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* TF pills */
.tf-row { display: flex; gap: 3px; flex-shrink: 0; }
.tf-p {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 9px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.1s;
  white-space: nowrap;
}
.tf-p:hover { border-color: var(--amber-d); color: var(--text); }
.tf-p.active { background: var(--amber-g); border-color: var(--amber); color: var(--amber); }
.tf-p.hidden { display: none; }

/* Strategy toggle */
.strat-row { display: flex; flex-shrink: 0; }
.st-p {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.1s;
}
.st-p:first-child { border-radius: 2px 0 0 2px; }
.st-p:last-child  { border-radius: 0 2px 2px 0; }
.st-p + .st-p { border-left: none; }
.st-p:hover { color: var(--text); }
.st-p.active[data-s="dmi"]    { background: #00c87020; border-color: var(--green);  color: var(--green); }
.st-p.active[data-s="macd"]   { background: #4090ff20; border-color: var(--blue);   color: var(--blue); }
.st-p.active[data-s="purple"] { background: #a080ff20; border-color: var(--violet); color: var(--violet); }

/* Inline controls */
.h-lbl { flex-shrink: 0; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; white-space: nowrap; }
.h-num {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 5px 7px;
  width: 68px;
  border-radius: 2px;
  outline: none;
  -moz-appearance: textfield;
  flex-shrink: 0;
}
.h-num::-webkit-outer-spin-button,
.h-num::-webkit-inner-spin-button { -webkit-appearance: none; }
.h-num:focus { border-color: var(--amber-d); }

.slide-wrap { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
input[type="range"].h-sl {
  width: 80px;
  -webkit-appearance: none;
  height: 2px;
  background: var(--border2);
  outline: none;
  border-radius: 1px;
  flex-shrink: 0;
}
input[type="range"].h-sl::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  background: var(--amber);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 4px var(--amber);
}
.sl-val { font-size: 14px; font-weight: 600; color: var(--amber); min-width: 20px; flex-shrink: 0; }

/* DMI diff row */
#dmi-extra { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Scan button */
#scan-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  padding: 6px 16px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
#scan-btn:hover:not(:disabled) { background: var(--amber-g); box-shadow: 0 0 16px var(--amber-g); }
#scan-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#scan-btn.s-macd { border-color: var(--blue); color: var(--blue); }
#scan-btn.s-macd:hover:not(:disabled) { background: #4090ff20; }
#scan-btn.s-purple { border-color: var(--violet); color: var(--violet); }
#scan-btn.s-purple:hover:not(:disabled) { background: #a080ff20; }
.spinner {
  width: 10px; height: 10px;
  border: 1.5px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
#scan-btn.loading .spinner { display: block; }

/* Status + API */
#status {
  flex-shrink: 0;
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  max-width: 280px;
  overflow: hidden;
  text-overflow: ellipsis;
}
#status:hover { border-color: var(--amber-d); }
#status.ok  { border-color: var(--green-d); color: var(--green); }
#status.err { border-color: var(--red);      color: var(--red); }

#api-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 5px 9px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.1s;
}
#api-btn:hover { border-color: var(--amber-d); color: var(--amber); }

/* ── Stats row ── */
#stats-row {
  height: var(--sh);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: fixed;
  top: var(--hh); left: 0; right: 0;
  z-index: 90;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 14px;
}

#srch {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 9px 4px 26px;
  border-radius: 2px;
  outline: none;
  width: 180px;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='6' cy='6' r='4.5' stroke='%23405060' stroke-width='1.2'/%3E%3Cpath d='M9.5 9.5L12 12' stroke='%23405060' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 8px center;
}
#srch:focus { border-color: var(--border2); }
#srch::placeholder { color: var(--mute); }

.s-sep { width: 1px; height: 14px; background: var(--border); }
.s-stat { font-size: 11px; white-space: nowrap; }
.s-stat b { color: var(--amber); font-weight: 600; margin-right: 3px; }
.s-stat span { color: var(--dim); font-size: 10px; }
#meta { margin-left: auto; font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 420px; }

/* ── Main area ── */
#main {
  position: fixed;
  top: calc(var(--hh) + var(--sh));
  left: 0; right: 0; bottom: 0;
  overflow-y: auto;
}
#main::-webkit-scrollbar { width: 4px; }
#main::-webkit-scrollbar-track { background: transparent; }
#main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead { position: sticky; top: 0; z-index: 5; background: var(--bg2); }
th {
  padding: 8px 14px;
  text-align: left;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--mute);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
th:hover { color: var(--dim); }
th.srt { color: var(--amber); }
th .ar { margin-left: 4px; opacity: 0.5; }
th.srt .ar { opacity: 1; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.08s;
  animation: fadeIn 0.25s ease both;
}
@keyframes fadeIn { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:none} }
tbody tr:hover { background: var(--bg3); }

td { padding: 8px 14px; vertical-align: middle; white-space: nowrap; }

.tc { font-weight: 600; color: var(--amber); letter-spacing: 0.04em; }
.tn { color: var(--dim); font-size: 11px; margin-left: 7px; }
.mb {
  font-size: 9px; padding: 1px 5px; border-radius: 1px;
  margin-left: 5px; letter-spacing: 0.07em; font-weight: 400;
}
.mb-tw  { background: #15253a; color: var(--blue);   border: 1px solid #1e3a60; }
.mb-two { background: #25153a; color: var(--violet); border: 1px solid #3a1e60; }
.tt { color: var(--dim); font-size: 11px; }
.cl { font-weight: 600; }
.vl { color: var(--dim); }
.ind { font-size: 11px; }
.dp { color: var(--green); }
.dm { color: var(--red); }
.mp { color: var(--green); }
.mn { color: var(--red); }
.pbdg { font-size: 9px; padding: 2px 7px; border-radius: 1px; background: #a080ff18; border: 1px solid var(--violet); color: var(--violet); letter-spacing: 0.07em; }
.gbdg { font-size: 9px; padding: 2px 7px; border-radius: 1px; background: #00c87018; border: 1px solid var(--green); color: var(--green); letter-spacing: 0.07em; }

.empty-msg { padding: 80px 40px; text-align: center; color: var(--mute); line-height: 2.5; }
.empty-msg .ic { font-size: 28px; opacity: 0.25; display: block; margin-bottom: 12px; }
.err-msg { padding: 60px 40px; color: var(--red); text-align: center; line-height: 2; }
</style>
</head>
<body>

<div id="prog"></div>

<div id="hdr">
  <div class="logo">TWSE SCAN</div>
  <div class="vsep"></div>

  <!-- TF -->
  <div class="tf-row" id="tf-row">
    <button class="tf-p" data-tf="15m"  data-pu="0" onclick="selTf(this)">15m</button>
    <button class="tf-p" data-tf="30m"  data-pu="0" onclick="selTf(this)">30m</button>
    <button class="tf-p" data-tf="60m"  data-pu="1" onclick="selTf(this)">60m</button>
    <button class="tf-p" data-tf="180m" data-pu="0" onclick="selTf(this)">180m</button>
    <button class="tf-p" data-tf="240m" data-pu="0" onclick="selTf(this)">240m</button>
    <button class="tf-p active" data-tf="1d" data-pu="1" onclick="selTf(this)">1d</button>
  </div>
  <div class="vsep"></div>

  <!-- Strategy -->
  <div class="strat-row">
    <button class="st-p active" data-s="dmi"    onclick="selStrat(this)">DMI</button>
    <button class="st-p"        data-s="macd"   onclick="selStrat(this)">MACD</button>
    <button class="st-p"        data-s="purple" onclick="selStrat(this)">紫圈</button>
  </div>
  <div class="vsep"></div>

  <!-- Window -->
  <span class="h-lbl">窗口</span>
  <div class="slide-wrap">
    <input type="range" class="h-sl" id="h-win" min="2" max="20" value="3"
           oninput="document.getElementById('h-win-v').textContent=this.value">
    <span class="sl-val" id="h-win-v">3</span>
  </div>
  <div class="vsep"></div>

  <!-- Volume -->
  <span class="h-lbl">日量≥</span>
  <input type="number" class="h-num" id="h-vol" placeholder="0" min="0" step="100">
  <span class="h-lbl" style="color:var(--mute)">張</span>

  <!-- DMI diff (conditional) -->
  <div id="dmi-vsep" class="vsep"></div>
  <div id="dmi-extra">
    <span class="h-lbl">Δ範圍</span>
    <input type="number" class="h-num" id="h-dmin" placeholder="min" min="0" max="100" step="0.1">
    <span class="h-lbl" style="color:var(--mute)">～</span>
    <input type="number" class="h-num" id="h-dmax" placeholder="max" min="0" max="100" step="0.1">
  </div>

  <div class="vsep"></div>
  <button id="scan-btn" onclick="runScan()">
    <div class="spinner"></div>
    <span id="btn-txt">▶ SCAN</span>
  </button>

  <div style="flex:1 1 auto;min-width:12px"></div>

  <div id="status" onclick="checkStatus()" title="點擊刷新 API 狀態">— CONNECTING</div>
  <div class="vsep"></div>
  <button id="api-btn" onclick="editApi()" title="切換 API 位置">API</button>
</div>

<!-- Stats row -->
<div id="stats-row">
  <input type="text" id="srch" placeholder="搜尋代碼 / 股名..." oninput="filterRows()">
  <div class="s-sep"></div>
  <div class="s-stat"><b id="hits">—</b><span>HIT</span></div>
  <div class="s-sep"></div>
  <div class="s-stat"><b id="scanned">—</b><span>SCAN</span></div>
  <div class="s-sep"></div>
  <div class="s-stat"><b id="ms">—</b><span>MS</span></div>
  <div id="meta"></div>
</div>

<!-- Main table -->
<div id="main">
  <div class="empty-msg">
    <span class="ic">◈</span>
    選擇週期與策略<br>
    <span style="font-size:10px;color:var(--mute)">按 SCAN 開始 · 支援 Enter 快捷鍵</span>
  </div>
</div>

<script>
let API = (new URLSearchParams(location.search).get('api') || localStorage.getItem('apiUrl') || 'http://127.0.0.1:8000').replace(/\/$/, '');
let currentTf = '1d', currentStrat = 'dmi', allRows = [];

function prog(p) { document.getElementById('prog').style.width = p + '%'; }
function fmtLots(v) { return v >= 1000 ? (v/1000).toFixed(1)+'K張' : v+'張'; }

function selTf(btn) {
  if (btn.classList.contains('hidden')) return;
  document.querySelectorAll('.tf-p').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTf = btn.dataset.tf;
}

function refreshTf() {
  const pu = currentStrat === 'purple';
  document.querySelectorAll('.tf-p').forEach(b => {
    b.classList.toggle('hidden', pu && b.dataset.pu !== '1');
  });
  if (pu && !['60m','1d'].includes(currentTf)) {
    const fb = document.querySelector('.tf-p[data-tf="1d"]');
    if (fb) selTf(fb);
  }
}

function selStrat(btn) {
  document.querySelectorAll('.st-p').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStrat = btn.dataset.s;

  const sb = document.getElementById('scan-btn');
  sb.className = '';
  if (currentStrat === 'macd')   sb.classList.add('s-macd');
  if (currentStrat === 'purple') sb.classList.add('s-purple');

  const isDmi = currentStrat === 'dmi';
  document.getElementById('dmi-extra').style.display = isDmi ? 'flex' : 'none';
  document.getElementById('dmi-vsep').style.display  = isDmi ? '' : 'none';
  refreshTf();
}

async function checkStatus() {
  const el = document.getElementById('status');
  el.textContent = '— CONNECTING'; el.className = '';
  try {
    const d = await fetch(`${API}/status`, { headers: {'ngrok-skip-browser-warning':'1'} }).then(r => r.json());
    if (d.status === 'ok') {
      const latest30m = d.timeframes?.['30m']?.latest || 'N/A';
      const dbUpdatedAt = d.db_updated_at || 'N/A';
      el.textContent = `✓ 30m:${latest30m} DB:${dbUpdatedAt}`; el.className = 'ok';
      el.title = `30m 最新：${latest30m}\nDB 更新：${dbUpdatedAt}\nAPI 載入：${d.api_loaded_at || 'N/A'}`;
    } else { el.textContent = '⚠ NO DATA'; el.className = 'err'; }
  } catch { el.textContent = '✕ OFFLINE'; el.className = 'err'; }
}

function editApi() {
  const v = prompt('API Base URL:', API);
  if (v !== null && v.trim()) { API = v.trim().replace(/\/$/, ''); localStorage.setItem('apiUrl', API); checkStatus(); }
}

async function runScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true; btn.classList.add('loading');
  document.getElementById('btn-txt').textContent = 'SCANNING';
  prog(20);

  const w = parseInt(document.getElementById('h-win').value) || 3;
  const body = {
    strategy: currentStrat, timeframe: currentTf, dmi_window: w,
    min_volume: parseInt(document.getElementById('h-vol').value) || 0,
    dmi_diff_min: currentStrat === 'dmi' ? (parseFloat(document.getElementById('h-dmin').value) || 0) : 0,
    dmi_diff_max: currentStrat === 'dmi' ? (parseFloat(document.getElementById('h-dmax').value) || 0) : 0,
  };

  const t0 = performance.now();
  try {
    prog(50);
    const r = await fetch(`${API}/scan`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
      body: JSON.stringify(body),
    });
    prog(80);
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || `HTTP ${r.status}`); }

    const data = await r.json();
    const ms = Math.round(performance.now() - t0);
    allRows = data.results;

    document.getElementById('hits').textContent    = data.total_hits;
    document.getElementById('scanned').textContent = data.total_scan;
    document.getElementById('ms').textContent      = ms;

    const sn = {dmi:'DMI',macd:'MACD',purple:'紫圈'}[currentStrat];
    let meta = `${currentTf} · ${sn}`;
    if (currentStrat !== 'purple') meta += ` · W${w}`;
    if (currentStrat === 'purple' && data.scan_at) meta += ` · 掃描於 ${data.scan_at}`;
    if (body.min_volume > 0) meta += ` · 日量≥${body.min_volume}張`;
    if (currentStrat === 'dmi' && (body.dmi_diff_min > 0 || body.dmi_diff_max > 0))
      meta += ` · Δ${body.dmi_diff_min||0}~${body.dmi_diff_max||'∞'}`;
    document.getElementById('meta').textContent = meta;

    render(allRows);
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="err-msg">ERROR: ${e.message}<br><small>確認 uvicorn 已啟動並有資料</small></div>`;
    document.getElementById('meta').textContent = 'FAILED';
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
    document.getElementById('btn-txt').textContent = '▶ SCAN';
    prog(100); setTimeout(() => prog(0), 500);
  }
}

let sCol = null, sAsc = true;

function indHead() {
  if (currentStrat === 'dmi')    return '+DI / -DI / Δ';
  if (currentStrat === 'macd')   return 'MACD / Signal';
  return '訊號';
}

function indCell(r) {
  if (currentStrat === 'dmi')
    return `<span class="dp">+${r.di_plus}</span><span style="color:var(--mute)"> / </span><span class="dm">-${r.di_minus}</span><span style="color:var(--dim)"> Δ${(r.dmi_diff||0).toFixed(2)}</span>`;
  if (currentStrat === 'macd') {
    const c = r.macd_val > 0 ? 'mp' : 'mn';
    return `<span class="${c}">${r.macd_val.toFixed(4)}</span><span style="color:var(--mute)"> / </span><span style="color:var(--dim)">${r.macd_sig.toFixed(4)}</span>`;
  }
  const lbl = r.signal_label || '紫圈';
  return `<span class="${lbl==='綠圈'?'gbdg':'pbdg'}">${lbl}</span>`;
}

function render(rows) {
  if (!rows.length) {
    document.getElementById('main').innerHTML = `<div class="empty-msg"><span class="ic">◯</span>無符合條件的標的<br><span style="font-size:10px;color:var(--mute)">放大窗口或降低成交量門檻</span></div>`;
    return;
  }
  const sc = c => sCol===c ? 'srt' : '';
  const ar = c => `<span class="ar">${sCol!==c?'⇅':sAsc?'↑':'↓'}</span>`;

  const rows_html = rows.map((r,i) => {
    const isTW = r.ticker.endsWith('.TW');
    const code = r.ticker.replace(/\.(TW|TWO)$/,'');
    const name = r.name && r.name !== r.ticker ? r.name : '';
    const lots = r.volume_lots ?? Math.floor((r.volume||0)/1000);
    return `<tr style="animation-delay:${Math.min(i*12,200)}ms">
      <td><span class="tc">${code}</span>${name?`<span class="tn">${name}</span>`:''}<span class="mb ${isTW?'mb-tw':'mb-two'}">${isTW?'上市':'上櫃'}</span></td>
      <td class="tt">${r.trigger_time}</td>
      <td class="cl">${r.close.toFixed(2)}</td>
      <td class="vl">${fmtLots(lots)}</td>
      <td class="ind">${indCell(r)}</td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <table>
      <thead><tr>
        <th onclick="sortBy('ticker')" class="${sc('ticker')}">CODE / NAME ${ar('ticker')}</th>
        <th onclick="sortBy('trigger_time')" class="${sc('trigger_time')}">觸發時間 ${ar('trigger_time')}</th>
        <th onclick="sortBy('close')" class="${sc('close')}">收盤 ${ar('close')}</th>
        <th onclick="sortBy('volume_lots')" class="${sc('volume_lots')}">日量 ${ar('volume_lots')}</th>
        <th>${indHead()}</th>
      </tr></thead>
      <tbody>${rows_html}</tbody>
    </table>`;
}

function sortBy(col) {
  if (sCol === col) sAsc = !sAsc; else { sCol = col; sAsc = true; }
  const sorted = [...allRows].sort((a,b) => {
    const va = col==='volume_lots' ? (a.volume_lots??Math.floor((a.volume||0)/1000)) : a[col];
    const vb = col==='volume_lots' ? (b.volume_lots??Math.floor((b.volume||0)/1000)) : b[col];
    if (typeof va === 'number') return sAsc ? va-vb : vb-va;
    return sAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  render(sorted);
}

function filterRows() {
  const q = document.getElementById('srch').value.trim().toLowerCase();
  if (!q) { render(allRows); return; }
  render(allRows.filter(r => r.ticker.toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q)));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName !== 'INPUT') runScan();
});

(function init() {
  checkStatus();
  // init DMI extra visible
  document.getElementById('dmi-extra').style.display = 'flex';
  document.getElementById('dmi-vsep').style.display = '';
})();
</script>
</body>
</html>
