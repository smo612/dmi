<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股掃股系統 Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root,
[data-theme="light"] {
  --bg: #eff3f8;
  --panel: #ffffff;
  --panel-2: #f8fafc;
  --card: #ffffff;
  --line: #dbe5ef;
  --line-2: #c7d4e3;
  --text: #132238;
  --text-dim: #506275;
  --text-mute: #7f91a6;
  --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
  --green: #18a058;
  --green-soft: #edf9f1;
  --blue: #2f6fed;
  --blue-soft: #eef4ff;
  --violet: #7a3ff2;
  --violet-soft: #f4efff;
  --red: #d9485f;
  --red-soft: #fff1f3;
  --amber: #d18b19;
  --panel-scale: 1.12;
  --font-main: "Inter", "Noto Sans TC", sans-serif;
}

[data-theme="dark"] {
  --bg: #0c1320;
  --panel: #121b2b;
  --panel-2: #172233;
  --card: #121b2b;
  --line: #223247;
  --line-2: #32455f;
  --text: #ebf3ff;
  --text-dim: #9fb1c6;
  --text-mute: #6d8098;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
  --green: #4ade80;
  --green-soft: rgba(74, 222, 128, 0.12);
  --blue: #7ea8ff;
  --blue-soft: rgba(126, 168, 255, 0.14);
  --violet: #c59dff;
  --violet-soft: rgba(197, 157, 255, 0.14);
  --red: #ff8aa0;
  --red-soft: rgba(255, 138, 160, 0.12);
  --amber: #ffc759;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-main);
  background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, #ffffff 15%) 100%);
  color: var(--text);
  min-height: 100vh;
}

button,
input,
select {
  font: inherit;
}

#prog {
  position: fixed;
  inset: 0 auto auto 0;
  height: 3px;
  width: 0;
  background: var(--green);
  z-index: 999;
  transition: width 0.25s ease;
}

.app {
  display: grid;
  grid-template-columns: 310px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
  background: color-mix(in srgb, var(--panel) 92%, transparent 8%);
  border-right: 1px solid var(--line);
  backdrop-filter: blur(14px);
}

.side-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.brand-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: var(--green);
  box-shadow: 0 0 0 6px color-mix(in srgb, var(--green) 20%, transparent 80%);
}

.theme-btn {
  border: 1px solid var(--line-2);
  background: var(--panel-2);
  color: var(--text-dim);
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
}

.api-chip {
  margin: 14px 22px 0;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--panel-2);
  color: var(--text-mute);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.api-chip.ok {
  color: var(--green);
  border-color: color-mix(in srgb, var(--green) 40%, var(--line) 60%);
  background: var(--green-soft);
}

.api-chip.err {
  color: var(--red);
  border-color: color-mix(in srgb, var(--red) 40%, var(--line) 60%);
  background: var(--red-soft);
}

.section {
  padding: 18px 22px 0;
}

.section-label {
  margin-bottom: 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
}

.grid-3,
.grid-2 {
  display: grid;
  gap: 8px;
}

.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }

.seg-btn,
.tf-btn,
.scan-btn,
.num-input {
  transform-origin: left center;
}

.seg-btn,
.tf-btn {
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text-dim);
  border-radius: 14px;
  cursor: pointer;
  transition: 0.18s ease;
}

.seg-btn {
  padding: calc(11px * var(--panel-scale)) calc(8px * var(--panel-scale));
  font-size: calc(13px * var(--panel-scale));
  font-weight: 600;
}

.tf-btn {
  padding: calc(10px * var(--panel-scale)) calc(8px * var(--panel-scale));
  font-size: calc(13px * var(--panel-scale));
  font-weight: 600;
}

.seg-btn:hover,
.tf-btn:hover {
  border-color: var(--line-2);
  color: var(--text);
}

.seg-btn.active[data-s="dmi"],
.tf-btn.active.s-dmi {
  color: var(--green);
  border-color: color-mix(in srgb, var(--green) 48%, var(--line) 52%);
  background: var(--green-soft);
}

.seg-btn.active[data-s="macd"],
.tf-btn.active.s-macd {
  color: var(--blue);
  border-color: color-mix(in srgb, var(--blue) 48%, var(--line) 52%);
  background: var(--blue-soft);
}

.seg-btn.active[data-s="purple"],
.tf-btn.active.s-purple {
  color: var(--violet);
  border-color: color-mix(in srgb, var(--violet) 48%, var(--line) 52%);
  background: var(--violet-soft);
}

.tf-btn.hidden { display: none; }

.param {
  margin-bottom: 16px;
}

.param-label {
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
}

.param-label em {
  font-style: normal;
  font-size: 11px;
  color: var(--text-mute);
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(to right, var(--green) 0%, var(--line-2) 0%);
  outline: none;
}

.slider.s-macd { background: linear-gradient(to right, var(--blue) 0%, var(--line-2) 0%); }
.slider.s-purple { background: linear-gradient(to right, var(--violet) 0%, var(--line-2) 0%); }

.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: calc(16px * var(--panel-scale));
  height: calc(16px * var(--panel-scale));
  border-radius: 50%;
  background: var(--panel);
  border: 2px solid var(--green);
  box-shadow: var(--shadow);
  cursor: pointer;
}

.slider.s-macd::-webkit-slider-thumb { border-color: var(--blue); }
.slider.s-purple::-webkit-slider-thumb { border-color: var(--violet); }

.slider-value {
  min-width: 28px;
  text-align: right;
  font-size: calc(16px * var(--panel-scale));
  font-weight: 700;
  color: var(--green);
}

.slider-value.s-macd { color: var(--blue); }
.slider-value.s-purple { color: var(--violet); }

.num-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.turnover-filter {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 84px;
  gap: 8px;
}

.num-input {
  width: 100%;
  padding: calc(11px * var(--panel-scale)) calc(12px * var(--panel-scale));
  border-radius: 14px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  font-size: calc(13px * var(--panel-scale));
  outline: none;
  transition: border-color 0.18s ease;
}

.num-input:focus { border-color: color-mix(in srgb, var(--green) 55%, var(--line) 45%); }
.num-input.s-macd:focus { border-color: color-mix(in srgb, var(--blue) 55%, var(--line) 45%); }
.num-input.s-purple:focus { border-color: color-mix(in srgb, var(--violet) 55%, var(--line) 45%); }

.note {
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--violet) 30%, var(--line) 70%);
  background: var(--violet-soft);
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.8;
}

.sidebar-footer {
  margin-top: auto;
  padding: 6px 22px 22px;
}

.scan-btn {
  width: 100%;
  padding: calc(13px * var(--panel-scale)) calc(14px * var(--panel-scale));
  border: none;
  border-radius: 16px;
  color: #fff;
  font-size: calc(14px * var(--panel-scale));
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--green);
  box-shadow: 0 8px 18px rgba(24, 160, 88, 0.28);
}

.scan-btn.s-macd {
  background: var(--blue);
  box-shadow: 0 8px 18px rgba(47, 111, 237, 0.28);
}

.scan-btn.s-purple {
  background: var(--violet);
  box-shadow: 0 8px 18px rgba(122, 63, 242, 0.28);
}

.scan-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.spinner {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-top-color: #fff;
  display: none;
  animation: spin 0.7s linear infinite;
}

.scan-btn.loading .spinner { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.content {
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.stats-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  padding: 16px 24px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--panel) 92%, transparent 8%);
  backdrop-filter: blur(14px);
}

.stat-card {
  min-width: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--green);
}

.stat-value.s-macd { color: var(--blue); }
.stat-value.s-purple { color: var(--violet); }

.stat-label {
  margin-top: 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-mute);
}

.stat-divider {
  width: 1px;
  height: 36px;
  background: var(--line);
}

.meta {
  margin-left: auto;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-mute);
  white-space: pre-line;
}

.tools-bar {
  position: sticky;
  top: 84px;
  z-index: 19;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding: 14px 24px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}

.search {
  flex: 1 1 280px;
  min-width: 220px;
  padding: 12px 14px 12px 40px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--text);
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='7' cy='7' r='4.75' stroke='%2391A4B8' stroke-width='1.5'/%3E%3Cpath d='M10.5 10.5L14 14' stroke='%2391A4B8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 14px center;
}

.sort-select {
  min-width: 170px;
  padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--text);
}

.unit-select {
  padding: calc(11px * var(--panel-scale)) calc(12px * var(--panel-scale));
  border-radius: 14px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  font-size: calc(13px * var(--panel-scale));
}

.panel-size-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--panel);
  min-width: 240px;
}

.panel-size-label,
.panel-size-value {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
}

.panel-size-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 120px;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(to right, var(--green) 0%, var(--line-2) 0%);
}

.panel-size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--panel);
  border: 2px solid var(--green);
}

.cards-wrap {
  flex: 1;
  padding: 20px 24px 28px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(315px, 1fr));
  gap: 14px;
}

.card {
  border: 1px solid var(--line);
  border-radius: 20px;
  background: var(--card);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.card:hover {
  transform: translateY(-2px);
}

.card.s-dmi:hover { border-color: color-mix(in srgb, var(--green) 45%, var(--line) 55%); }
.card.s-macd:hover { border-color: color-mix(in srgb, var(--blue) 45%, var(--line) 55%); }
.card.s-purple:hover { border-color: color-mix(in srgb, var(--violet) 45%, var(--line) 55%); }

.card-head {
  padding: 16px 18px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--line);
}

.card-code {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.card-name {
  flex: 1;
  min-width: 0;
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.market-tag {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
}

.market-tag.tw {
  color: var(--blue);
  background: var(--blue-soft);
}

.market-tag.two {
  color: var(--violet);
  background: var(--violet-soft);
}

.card-body {
  padding: 14px 18px;
  display: grid;
  gap: 10px;
}

.body-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 18px;
}

.body-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-mute);
}

.body-value {
  text-align: right;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
}

.body-value.strong {
  font-size: 16px;
  color: var(--text);
}

.card-footer {
  padding: 12px 18px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--panel-2);
  border-top: 1px solid var(--line);
}

.chip {
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
}

.chip.pos { color: var(--green); background: var(--green-soft); }
.chip.neg { color: var(--red); background: var(--red-soft); }
.chip.blue { color: var(--blue); background: var(--blue-soft); }
.chip.violet { color: var(--violet); background: var(--violet-soft); }
.chip.neutral {
  color: var(--text-dim);
  background: var(--panel);
  border: 1px solid var(--line-2);
}

.empty,
.error {
  padding: 80px 16px;
  text-align: center;
  color: var(--text-mute);
}

.empty h3,
.error h3 {
  margin: 0 0 8px;
  font-size: 22px;
}

.empty p,
.error p {
  margin: 0;
  line-height: 1.8;
  font-size: 14px;
}

@media (max-width: 980px) {
  .app {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--line);
  }

  .tools-bar {
    top: 82px;
  }
}

@media (max-width: 700px) {
  .stats-bar,
  .tools-bar,
  .cards-wrap {
    padding-left: 16px;
    padding-right: 16px;
  }

  .tools-bar {
    top: 124px;
  }

  .panel-size-box,
  .sort-select,
  .search {
    width: 100%;
  }

  .cards-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div id="prog"></div>

<div class="app">
  <aside class="sidebar">
    <div class="side-header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>台股掃股 Cards</span>
      </div>
      <button id="theme-btn" class="theme-btn" type="button" onclick="toggleTheme()">夜間</button>
    </div>

    <div id="api-status" class="api-chip" onclick="editApi()" title="點我可改 API">API: 檢查中...</div>

    <div class="section">
      <div class="section-label">策略</div>
      <div class="grid-3">
        <button class="seg-btn active" data-s="dmi" type="button" onclick="selectStrategy(this)">DMI</button>
        <button class="seg-btn" data-s="macd" type="button" onclick="selectStrategy(this)">MACD</button>
        <button class="seg-btn" data-s="purple" type="button" onclick="selectStrategy(this)">紫圈</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">K 週期</div>
      <div class="grid-2">
        <button class="tf-btn" data-tf="15m" data-pu="0" type="button" onclick="selectTimeframe(this)">15m</button>
        <button class="tf-btn" data-tf="30m" data-pu="0" type="button" onclick="selectTimeframe(this)">30m</button>
        <button class="tf-btn" data-tf="60m" data-pu="1" type="button" onclick="selectTimeframe(this)">60m</button>
        <button class="tf-btn" data-tf="180m" data-pu="0" type="button" onclick="selectTimeframe(this)">180m</button>
        <button class="tf-btn" data-tf="240m" data-pu="0" type="button" onclick="selectTimeframe(this)">240m</button>
        <button class="tf-btn active" data-tf="1d" data-pu="1" type="button" onclick="selectTimeframe(this)">日K</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">參數</div>

      <div class="param" id="window-row">
        <div class="param-label">
          <span>幾根 K 棒內觸發</span>
          <em>2 ~ 20</em>
        </div>
        <div class="slider-row">
          <input id="window-slider" class="slider" type="range" min="2" max="20" value="3" oninput="updateWindowSlider()">
          <span id="window-value" class="slider-value">3</span>
        </div>
      </div>

      <div class="param">
        <div class="param-label">
          <span>最低成交量（日K，張）</span>
          <em>0 = 不限</em>
        </div>
        <input id="min-volume" class="num-input" type="number" min="0" step="100" placeholder="0">
      </div>

      <div class="param">
        <div class="param-label">
          <span>最低成交值（萬）</span>
          <em>0 = 不限</em>
        </div>
        <div class="turnover-filter">
          <input id="min-turnover" class="num-input" type="number" min="0" step="100" placeholder="0">
          <select id="min-turnover-unit" class="unit-select">
            <option value="wan" selected>萬</option>
            <option value="yi">億</option>
          </select>
        </div>
      </div>

      <div class="param" id="dmi-diff-row">
        <div class="param-label">
          <span>+DI / -DI 差值範圍</span>
          <em>0 = 不限</em>
        </div>
        <div class="num-grid">
          <input id="dmi-diff-min" class="num-input" type="number" min="0" max="100" step="0.1" placeholder="最小值 0">
          <input id="dmi-diff-max" class="num-input" type="number" min="0" max="100" step="0.1" placeholder="最大值 0">
        </div>
      </div>

      <div id="purple-note" class="note" hidden>
        紫圈走盤後預掃報告，不是即時重算。<br>
        目前支援 60m / 日K，可再用幾根 K 棒與成交值做二次篩選。
      </div>
    </div>

    <div class="sidebar-footer">
      <button id="scan-btn" class="scan-btn" type="button" onclick="runScan()">
        <span class="spinner"></span>
        <span id="scan-btn-text">執行掃描</span>
      </button>
    </div>
  </aside>

  <main class="content">
    <div class="stats-bar">
      <div class="stat-card">
        <div id="hits-value" class="stat-value">0</div>
        <div class="stat-label">命中</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div id="scan-value" class="stat-value">0</div>
        <div class="stat-label">掃描</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div id="ms-value" class="stat-value">0</div>
        <div class="stat-label">ms</div>
      </div>
      <div id="meta" class="meta">等待第一次掃描</div>
    </div>

    <div class="tools-bar">
      <input id="search-input" class="search" type="text" placeholder="搜尋代碼 / 股名..." oninput="renderActiveRows()">
      <select id="sort-select" class="sort-select" onchange="renderActiveRows()">
        <option value="trigger_desc">最新觸發</option>
        <option value="turnover_desc">成交值高到低</option>
        <option value="volume_desc">成交量高到低</option>
        <option value="close_desc">收盤高到低</option>
        <option value="ticker_asc">代碼排序</option>
      </select>
      <div class="panel-size-box">
        <span class="panel-size-label">面板大小</span>
        <input id="panel-size-slider" class="panel-size-slider" type="range" min="90" max="130" step="5" value="112" oninput="updatePanelScale()">
        <span id="panel-size-text" class="panel-size-value">112%</span>
      </div>
    </div>

    <div class="cards-wrap">
      <div id="cards-area" class="empty">
        <h3>Cards 版已就緒</h3>
        <p>左邊調好策略與參數後，直接按一次執行掃描。</p>
      </div>
    </div>
  </main>
</div>

<script>
const queryApi = new URLSearchParams(location.search).get("api");
const remoteApiDefault = "https://venomous-related-renderer.ngrok-free.dev";
const hostDefaultApi = location.hostname.endsWith("onrender.com") ? remoteApiDefault : "http://127.0.0.1:8000";

let API = (queryApi || localStorage.getItem("apiUrl") || hostDefaultApi).replace(/\/$/, "");
let currentStrategy = "dmi";
let currentTimeframe = "1d";
let allRows = [];
let turnoverFilterUnit = localStorage.getItem("turnoverUnit") || "wan";

function setProgress(percent) {
  document.getElementById("prog").style.width = percent + "%";
}

function formatLots(lots) {
  if (!Number.isFinite(lots)) return "-";
  return lots >= 1000 ? `${(lots / 1000).toFixed(1)}K張` : `${lots}張`;
}

function formatTurnover(turnover) {
  if (!Number.isFinite(turnover)) return "-";
  const inWan = turnover / 10000;
  if (inWan >= 10000) {
    return `${(inWan / 10000).toFixed(1)}億`;
  }
  return `${inWan.toFixed(1)}萬`;
}

function getTurnoverThresholdWan() {
  const raw = Number(document.getElementById("min-turnover").value) || 0;
  return turnoverFilterUnit === "yi" ? raw * 10000 : raw;
}

function getMarketTag(ticker) {
  return ticker.endsWith(".TW") ? { label: "上市", cls: "tw" } : { label: "上櫃", cls: "two" };
}

function updateThemeButton() {
  const theme = document.documentElement.getAttribute("data-theme");
  document.getElementById("theme-btn").textContent = theme === "dark" ? "日間" : "夜間";
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  updateThemeButton();
}

function updatePanelScale() {
  const slider = document.getElementById("panel-size-slider");
  const value = Number(slider.value) || 112;
  document.documentElement.style.setProperty("--panel-scale", (value / 100).toFixed(2));
  document.getElementById("panel-size-text").textContent = `${value}%`;

  const percent = ((value - 90) / 40) * 100;
  slider.style.background = `linear-gradient(to right, var(--green) ${percent}%, var(--line-2) ${percent}%)`;
  localStorage.setItem("panelScale", String(value));
}

function updateTurnoverUnit() {
  const select = document.getElementById("min-turnover-unit");
  turnoverFilterUnit = select.value || "wan";
  localStorage.setItem("turnoverUnit", turnoverFilterUnit);
}

function updateWindowSlider() {
  const slider = document.getElementById("window-slider");
  const value = Number(slider.value) || 3;
  document.getElementById("window-value").textContent = String(value);

  const percent = ((value - 2) / 18) * 100;
  const color = currentStrategy === "macd" ? "var(--blue)" : currentStrategy === "purple" ? "var(--violet)" : "var(--green)";
  slider.style.background = `linear-gradient(to right, ${color} ${percent}%, var(--line-2) ${percent}%)`;
}

function updateStrategyClasses() {
  const slider = document.getElementById("window-slider");
  const value = document.getElementById("window-value");
  const scanBtn = document.getElementById("scan-btn");

  slider.className = `slider${currentStrategy === "dmi" ? "" : " s-" + currentStrategy}`;
  value.className = `slider-value${currentStrategy === "dmi" ? "" : " s-" + currentStrategy}`;
  scanBtn.className = `scan-btn${currentStrategy === "dmi" ? "" : " s-" + currentStrategy}`;

  document.querySelectorAll(".tf-btn.active").forEach((btn) => {
    btn.classList.remove("s-dmi", "s-macd", "s-purple");
    btn.classList.add(`s-${currentStrategy}`);
  });

  document.querySelectorAll(".num-input").forEach((el) => {
    el.classList.remove("s-dmi", "s-macd", "s-purple");
    el.classList.add(`s-${currentStrategy}`);
  });

  const stats = ["hits-value", "scan-value", "ms-value"];
  stats.forEach((id) => {
    const el = document.getElementById(id);
    el.className = `stat-value${currentStrategy === "dmi" ? "" : " s-" + currentStrategy}`;
  });

  document.getElementById("dmi-diff-row").hidden = currentStrategy !== "dmi";
  document.getElementById("window-row").hidden = currentStrategy === "purple";
  document.getElementById("purple-note").hidden = currentStrategy !== "purple";

  updateWindowSlider();
}

function updateTimeframeOptions() {
  const purple = currentStrategy === "purple";
  document.querySelectorAll(".tf-btn").forEach((btn) => {
    const visible = !purple || btn.dataset.pu === "1";
    btn.classList.toggle("hidden", !visible);
  });

  if (purple && !["60m", "1d"].includes(currentTimeframe)) {
    const fallback = document.querySelector('.tf-btn[data-tf="1d"]');
    if (fallback) selectTimeframe(fallback);
  }
}

function selectStrategy(button) {
  document.querySelectorAll(".seg-btn").forEach((btn) => btn.classList.remove("active"));
  button.classList.add("active");
  currentStrategy = button.dataset.s;
  updateStrategyClasses();
  updateTimeframeOptions();
}

function selectTimeframe(button) {
  if (button.classList.contains("hidden")) return;
  document.querySelectorAll(".tf-btn").forEach((btn) => {
    btn.classList.remove("active", "s-dmi", "s-macd", "s-purple");
  });
  button.classList.add("active", `s-${currentStrategy}`);
  currentTimeframe = button.dataset.tf;
}

async function checkStatus() {
  const el = document.getElementById("api-status");
  el.textContent = "API: 檢查中...";
  el.className = "api-chip";

  try {
    const response = await fetch(`${API}/status`, {
      headers: { "ngrok-skip-browser-warning": "1" }
    });
    const data = await response.json();

    if (data.status !== "ok") throw new Error("status != ok");

    const summary = Object.entries(data.timeframes || {})
      .slice(0, 4)
      .map(([tf, item]) => `${tf}:${item.stocks}`)
      .join(" · ");

    el.textContent = `API: ${summary || "已連線"}`;
    el.className = "api-chip ok";
  } catch (error) {
    el.textContent = "API: 連線失敗，點我可修改";
    el.className = "api-chip err";
  }
}

function editApi() {
  const value = prompt("API Base URL", API);
  if (value === null) return;

  const next = value.trim().replace(/\/$/, "");
  if (!next) return;
  API = next;
  localStorage.setItem("apiUrl", API);
  checkStatus();
}

function buildMetaText(data, elapsedMs, requestBody) {
  const strategyName = currentStrategy === "dmi" ? "DMI" : currentStrategy === "macd" ? "MACD" : "紫圈";
  const lines = [`${currentTimeframe} · ${strategyName} · ${elapsedMs}ms`];

  if (currentStrategy !== "purple") {
    lines.push(`幾根 K 棒內：${requestBody.dmi_window}`);
  }
  if (requestBody.min_volume > 0) {
    lines.push(`日K成交量：${requestBody.min_volume} 張以上`);
  }
  if (requestBody.min_turnover > 0) {
    const unitLabel = turnoverFilterUnit === "yi" ? "億" : "萬";
    const rawValue = Number(document.getElementById("min-turnover").value) || 0;
    lines.push(`成交值：${rawValue} ${unitLabel}以上`);
  }
  if (currentStrategy === "dmi" && (requestBody.dmi_diff_min > 0 || requestBody.dmi_diff_max > 0)) {
    lines.push(`DMI差值：${requestBody.dmi_diff_min || 0} ~ ${requestBody.dmi_diff_max || "不限"}`);
  }
  if (currentStrategy === "purple" && data.scan_at) {
    lines.push(`報告時間：${data.scan_at}`);
  }
  return lines.join("\n");
}

async function runScan() {
  const button = document.getElementById("scan-btn");
  const buttonText = document.getElementById("scan-btn-text");
  button.disabled = true;
  button.classList.add("loading");
  buttonText.textContent = "掃描中...";
  setProgress(20);

  const requestBody = {
    strategy: currentStrategy,
    timeframe: currentTimeframe,
    dmi_window: Number(document.getElementById("window-slider").value) || 3,
    min_volume: Number(document.getElementById("min-volume").value) || 0,
    min_turnover: getTurnoverThresholdWan(),
    dmi_diff_min: currentStrategy === "dmi" ? Number(document.getElementById("dmi-diff-min").value) || 0 : 0,
    dmi_diff_max: currentStrategy === "dmi" ? Number(document.getElementById("dmi-diff-max").value) || 0 : 0
  };

  const t0 = performance.now();

  try {
    setProgress(45);
    const response = await fetch(`${API}/scan`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ngrok-skip-browser-warning": "1"
      },
      body: JSON.stringify(requestBody)
    });
    setProgress(78);

    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.detail || `HTTP ${response.status}`);
    }

    const elapsedMs = Math.round(performance.now() - t0);
    allRows = data.results || [];

    document.getElementById("hits-value").textContent = String(data.total_hits || 0);
    document.getElementById("scan-value").textContent = String(data.total_scan || 0);
    document.getElementById("ms-value").textContent = String(elapsedMs);
    document.getElementById("meta").textContent = buildMetaText(data, elapsedMs, requestBody);

    renderActiveRows();
  } catch (error) {
    document.getElementById("cards-area").innerHTML = `
      <div class="error">
        <h3>掃描失敗</h3>
        <p>${error.message}<br>請確認本機 uvicorn、ngrok 與 API 設定都還在線。</p>
      </div>`;
    document.getElementById("meta").textContent = "掃描失敗";
  } finally {
    button.disabled = false;
    button.classList.remove("loading");
    buttonText.textContent = "執行掃描";
    setProgress(100);
    setTimeout(() => setProgress(0), 400);
  }
}

function sortRows(rows) {
  const mode = document.getElementById("sort-select").value;
  const copy = [...rows];

  switch (mode) {
    case "turnover_desc":
      copy.sort((a, b) => (b.turnover || 0) - (a.turnover || 0));
      break;
    case "volume_desc":
      copy.sort((a, b) => (b.volume || 0) - (a.volume || 0));
      break;
    case "close_desc":
      copy.sort((a, b) => (b.close || 0) - (a.close || 0));
      break;
    case "ticker_asc":
      copy.sort((a, b) => a.ticker.localeCompare(b.ticker));
      break;
    case "trigger_desc":
    default:
      copy.sort((a, b) => String(b.trigger_time).localeCompare(String(a.trigger_time)));
      break;
  }

  return copy;
}

function openQuote(ticker) {
  const code = ticker.replace(/\.(TW|TWO)$/i, "");
  window.open(`https://tw.stock.yahoo.com/quote/${encodeURIComponent(code)}`, "_blank", "noopener");
}

function buildIndicatorFooter(row) {
  if (currentStrategy === "dmi") {
    return `
      <span class="chip pos">+DI ${Number(row.di_plus || 0).toFixed(2)}</span>
      <span class="chip neg">-DI ${Number(row.di_minus || 0).toFixed(2)}</span>
      <span class="chip neutral">差值 ${Number(row.dmi_diff || 0).toFixed(2)}</span>
      <span class="chip neutral">成交值 ${formatTurnover(row.turnover || 0)}</span>
    `;
  }

  if (currentStrategy === "macd") {
    const macdPositive = Number(row.macd_val || 0) >= 0;
    return `
      <span class="chip ${macdPositive ? "pos" : "neg"}">MACD ${Number(row.macd_val || 0).toFixed(3)}</span>
      <span class="chip blue">Signal ${Number(row.macd_sig || 0).toFixed(3)}</span>
      <span class="chip neutral">成交值 ${formatTurnover(row.turnover || 0)}</span>
    `;
  }

  const purpleLabel = row.signal_label || "紫圈";
  return `
    <span class="chip violet">${purpleLabel}</span>
    <span class="chip neutral">成交值 ${formatTurnover(row.turnover || 0)}</span>
  `;
}

function buildCard(row) {
  const market = getMarketTag(row.ticker);
  const shortCode = row.ticker.replace(/\.(TW|TWO)$/i, "");
  const displayName = row.name && row.name !== row.ticker ? row.name : "未命名標的";
  const volumeLots = Number.isFinite(row.volume_lots) ? row.volume_lots : Math.floor((row.volume || 0) / 1000);

  return `
    <article class="card s-${currentStrategy}" role="link" tabindex="0"
      onclick="openQuote('${row.ticker}')"
      onkeydown="if(event.key==='Enter' || event.key===' '){event.preventDefault();openQuote('${row.ticker}')}">
      <div class="card-head">
        <div class="card-code">${shortCode}</div>
        <div class="card-name">${displayName}</div>
        <div class="market-tag ${market.cls}">${market.label}</div>
      </div>
      <div class="card-body">
        <div class="body-row">
          <div class="body-label">觸發時間</div>
          <div class="body-value">${row.trigger_time}</div>
        </div>
        <div class="body-row">
          <div class="body-label">收盤</div>
          <div class="body-value strong">${Number(row.close || 0).toFixed(2)}</div>
        </div>
        <div class="body-row">
          <div class="body-label">日量</div>
          <div class="body-value">${formatLots(volumeLots)}</div>
        </div>
        <div class="body-row">
          <div class="body-label">成交值</div>
          <div class="body-value">${formatTurnover(row.turnover || 0)}</div>
        </div>
      </div>
      <div class="card-footer">${buildIndicatorFooter(row)}</div>
    </article>
  `;
}

function renderActiveRows() {
  const query = document.getElementById("search-input").value.trim().toLowerCase();
  let rows = allRows;

  if (query) {
    rows = rows.filter((row) => {
      const ticker = String(row.ticker || "").toLowerCase();
      const name = String(row.name || "").toLowerCase();
      return ticker.includes(query) || name.includes(query);
    });
  }

  rows = sortRows(rows);

  if (!rows.length) {
    document.getElementById("cards-area").innerHTML = `
      <div class="empty">
        <h3>目前沒有結果</h3>
        <p>可以試著放寬條件，或切換不同策略 / 週期再掃一次。</p>
      </div>`;
    return;
  }

  document.getElementById("cards-area").innerHTML = `<div class="cards-grid">${rows.map(buildCard).join("")}</div>`;
}

document.addEventListener("keydown", (event) => {
  if (event.key === "Enter" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "SELECT") {
    runScan();
  }
});

(function init() {
  const theme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", theme);
  updateThemeButton();

  const savedScale = Number(localStorage.getItem("panelScale") || "112");
  document.getElementById("panel-size-slider").value = String(savedScale);
  updatePanelScale();

  const turnoverUnitSelect = document.getElementById("min-turnover-unit");
  if (turnoverUnitSelect) {
    turnoverUnitSelect.value = turnoverFilterUnit;
    turnoverUnitSelect.addEventListener("change", updateTurnoverUnit);
  }

  updateWindowSlider();
  updateStrategyClasses();
  updateTimeframeOptions();
  checkStatus();
})();
</script>
</body>
</html>
